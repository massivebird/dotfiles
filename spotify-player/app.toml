client_id = "72c98cf347a34809bac791124c28f9c0"
client_port = 8888

theme = "framer"
playback_format = """
{track} • {artists}
{album}
{metadata}"""
tracks_playback_limit = 50
app_refresh_duration_in_ms = 32
playback_refresh_duration_in_ms = 0
cover_image_refresh_duration_in_ms = 2000
page_size_in_rows = 20

play_icon = "󰐊"
pause_icon = "󰏤"
liked_icon = "♥"

# Plain, Hidden, Rounded, Double, or Thick
border_type = "Plain"
# Rectangle or Line
progress_bar_type = "Rectangle"
# Top or Bottom
playback_window_position = "Bottom"
playback_window_width = 6

cover_img_length = 11
cover_img_width = 5
cover_img_scale = 1.0

enable_media_control = true
enable_notify = false
enable_streaming = "Never"
enable_cover_image_cache = true
default_device = "laptop-daemon"

[copy_command]
command = "xclip"
args = [
    "-sel",
    "c",
]

